<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Object Detector</title>
<style>
  body { font-family: sans-serif; text-align: center; margin: 0; padding: 16px; background: #111; color: #eee; }
  h2 { margin: 8px 0 16px; }
  #webcam-container { display: flex; justify-content: center; margin-bottom: 16px; }
  #webcam-container canvas { border-radius: 8px; max-width: 100%; }
  button { font-size: 16px; padding: 10px 24px; border-radius: 8px; border: none; background: #2563eb; color: #fff; margin: 4px; }
  button:disabled { background: #555; }
  #label-container div { margin: 6px auto; max-width: 320px; text-align: left; }
  .bar-bg { background: #333; border-radius: 6px; height: 18px; position: relative; overflow: hidden; }
  .bar-fill { background: #22c55e; height: 100%; }
  .bar-text { position: absolute; left: 8px; top: 0; font-size: 13px; line-height: 18px; }
</style>
</head>
<body>

<h2>Live Object Detector</h2>
<button id="start-btn" type="button">Start Camera</button>
<button id="flip-btn" type="button" disabled>Flip Camera</button>
<div id="webcam-container"></div>
<div id="label-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
  // Your Teachable Machine model link
  const URL = "https://teachablemachine.withgoogle.com/models/oPYBH87as/";

  let model, webcam, labelContainer, maxPredictions;
  let facingMode = "environment"; // back camera by default on phones
  let loopId;

  async function init() {
    document.getElementById("start-btn").disabled = true;
    document.getElementById("start-btn").innerText = "Loading model...";

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    const flip = true;
    webcam = new tmImage.Webcam(320, 320, flip);
    await webcam.setup({ facingMode: facingMode });
    await webcam.play();
    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");
    labelContainer.innerHTML = "";
    for (let i = 0; i < maxPredictions; i++) {
      labelContainer.appendChild(document.createElement("div"));
    }

    document.getElementById("start-btn").innerText = "Running";
    document.getElementById("flip-btn").disabled = false;
  }

  async function loop() {
    webcam.update();
    await predict();
    loopId = window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);
    prediction.sort((a, b) => b.probability - a.probability);
    for (let i = 0; i < maxPredictions; i++) {
      const p = prediction[i];
      const pct = (p.probability * 100).toFixed(1);
      labelContainer.childNodes[i].innerHTML =
        `<div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div>
         <div class="bar-text">${p.className}: ${pct}%</div></div>`;
    }
  }

  async function flipCamera() {
    facingMode = facingMode === "environment" ? "user" : "environment";
    if (webcam) {
      webcam.stop();
      cancelAnimationFrame(loopId);
    }
    webcam = new tmImage.Webcam(320, 320, true);
    await webcam.setup({ facingMode: facingMode });
    await webcam.play();
    document.getElementById("webcam-container").innerHTML = "";
    document.getElementById("webcam-container").appendChild(webcam.canvas);
    window.requestAnimationFrame(loop);
  }

  document.getElementById("start-btn").addEventListener("click", init);
  document.getElementById("flip-btn").addEventListener("click", flipCamera);
</script>

</body>
</html>
